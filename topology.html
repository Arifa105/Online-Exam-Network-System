<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Exam System — Network Topology</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050a12;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  color: #c9d8ef;
}

/* Animated grid bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridPulse 6s ease-in-out infinite;
  pointer-events:none; z-index:0;
}
@keyframes gridPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

header {
  text-align:center;
  padding: 32px 20px 20px;
  position:relative; z-index:2;
}

header h1 {
  font-family:'Rajdhani',sans-serif;
  font-size: clamp(18px, 3vw, 30px);
  font-weight:700;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#fff;
  text-shadow: 0 0 30px rgba(0,200,255,0.5);
}

header p {
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  color:#3a7a9c;
  letter-spacing:2px;
  margin-top:6px;
}

.legend {
  display:flex; justify-content:center; gap:20px; flex-wrap:wrap;
  padding: 10px 20px 16px;
  position:relative; z-index:2;
}
.leg-item { display:flex; align-items:center; gap:7px; font-size:12px; font-family:'Share Tech Mono',monospace; color:#4a7fa0; }
.leg-dot { width:10px; height:10px; border-radius:50%; }

/* SVG canvas */
.topo-wrap {
  position:relative; z-index:1;
  display:flex; justify-content:center; align-items:flex-start;
  padding: 0 16px 40px;
}

svg {
  width: 100%;
  max-width: 980px;
  height: auto;
  overflow: visible;
  filter: drop-shadow(0 0 40px rgba(0,150,255,0.08));
}

/* Tooltip */
.tooltip {
  position:fixed;
  background: rgba(5,15,30,0.97);
  border: 1px solid rgba(0,200,255,0.35);
  border-radius: 6px;
  padding: 12px 16px;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  line-height:1.7;
  color:#7de0ff;
  pointer-events:none;
  z-index:100;
  opacity:0;
  transition: opacity 0.2s;
  max-width:220px;
  box-shadow: 0 0 20px rgba(0,200,255,0.15);
}
.tooltip.show { opacity:1; }
.tooltip strong { color:#fff; font-size:12px; display:block; margin-bottom:4px; border-bottom:1px solid rgba(0,200,255,0.2); padding-bottom:4px; }
.tooltip span { color:#4a9fc4; }

/* Animate connection lines */
@keyframes dashFlow {
  to { stroke-dashoffset: -20; }
}

.flow-line {
  animation: dashFlow 1.2s linear infinite;
}
</style>
</head>
<body>

<header>
  <h1>Online Exam System — Network Topology</h1>
  <p>CISCO PACKET TRACER · VLAN SEGMENTED · THREE-TIER ARCHITECTURE</p>
</header>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>Admin VLAN 10</div>
  <div class="leg-item"><div class="leg-dot" style="background:#3b82f6"></div>Student VLAN 20</div>
  <div class="leg-item"><div class="leg-dot" style="background:#10b981"></div>Server VLAN 30</div>

  <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>WAN / Internet</div>

const tooltip = document.getElementById('tooltip');

document.querySelectorAll('.node').forEach(node => {
  node.addEventListener('mouseenter', (e) => {
    const name = node.dataset.name;
    const info = node.dataset.info;
    if (!name) return;
    const lines = info.split('&#10;').join('\n').split('\n');
    let html = `<strong>${name}</strong>`;
    lines.forEach(line => {
      const parts = line.split(':');
      if (parts.length >= 2) {
        html += `<div><span>${parts[0]}:</span> ${parts.slice(1).join(':').trim()}</div>`;
      } else {
        html += `<div>${line}</div>`;
      }
    });
    tooltip.innerHTML = html;
    tooltip.classList.add('show');
  });

  node.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  node.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
  });
});
</script>
</body>
</html>
